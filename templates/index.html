<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotion Detector</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        h1 { color: #333; }
        textarea { width: 100%; height: 100px; margin: 10px 0; padding: 10px; font-size: 14px; }
        button { background-color: #0062ff; color: white; border: none; padding: 10px 20px;
                 font-size: 16px; cursor: pointer; border-radius: 4px; }
        button:hover { background-color: #0045b5; }
        #output { margin-top: 20px; padding: 15px; background-color: #f4f4f4;
                  border-radius: 4px; font-size: 14px; min-height: 50px; }
    </style>
</head>
<body>
    <h1>Emotion Detector</h1>
    <p>Enter text below to detect the emotions expressed:</p>
    <textarea id="textToAnalyze" placeholder="Type your text here..."></textarea>
    <br>
    <button onclick="RunSentimentAnalysis()">Analyze Emotions</button>
    <div id="output">Results will appear here...</div>

    <script>
        function RunSentimentAnalysis() {
            const text = document.getElementById("textToAnalyze").value;
            const xhttp = new XMLHttpRequest();
            xhttp.onreadystatechange = function() {
                if (this.readyState === 4 && this.status === 200) {
                    document.getElementById("output").innerHTML = this.responseText;
                }
            };
            xhttp.open("GET", "/emotionDetector?textToAnalyze=" + encodeURIComponent(text), true);
            xhttp.send();
        }
    </script>
</body>
</html>
